<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height">
    <title>Charadas • Enigma do Dia</title>
    <link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animações de fundo -->
    <div class="bg-animation">
        <div class="circle" style="width: 300px; height: 300px; top: -150px; left: -150px; animation-delay: 0s;"></div>
        <div class="circle" style="width: 500px; height: 500px; bottom: -250px; right: -250px; animation-delay: 2s;"></div>
        <div class="circle" style="width: 200px; height: 200px; top: 50%; left: 80%; animation-delay: 4s;"></div>
        <div class="circle" style="width: 400px; height: 400px; bottom: 20%; left: -200px; animation-delay: 1s;"></div>
    </div>
    
    <div class="grid-overlay"></div>
    
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Cabeçalho -->
        <header class="header">
            <span class="emoji-icon">❓</span>
            <h1 class="title">CHARADAS</h1>
            <p class="subtitle">VIRE O CARD E DESVENDE O ENIGMA</p>
        </header>

        <!-- Seletor de modo -->
        <div class="mode-selector">
            <button class="mode-btn" id="btnModeDaily">
                <span>📅</span> CHARADA DO DIA
            </button>
            <button class="mode-btn" id="btnModeRandom">
                <span>🎲</span> ALEATÓRIA
            </button>
        </div>

        <!-- Card 3D -->
        <div class="card-wrapper">
            <div class="card" id="cardInner">
                <!-- Frente - Pergunta -->
                <div class="card-face front">
                    <div class="face-header">
                        <span class="badge" id="badgeTipo">🎲 PERGUNTA</span>
                    </div>
                    <p class="question" id="pergunta">CARREGANDO...</p>
                    <div class="hint">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 4v16M8 12l4 4 4-4"/>
                        </svg>
                        CLIQUE PARA VIRAR
                    </div>
                </div>

                <!-- Verso - Resposta -->
                <div class="card-face back">
                    <div class="face-header">
                        <span class="badge badge-resposta">🔓 RESPOSTA</span>
                    </div>
                    <p class="answer" id="resposta"></p>
                    <div class="hint back-hint">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 4v16M8 12l4 4 4-4"/>
                        </svg>
                        CLIQUE PARA VOLTAR
                    </div>
                </div>
            </div>
        </div>

        <!-- Botão principal -->
        <button class="btn-primary" id="btnNova">
            <span id="btnIcon">🎲</span>
            <span id="btnText">NOVA CHARADA</span>
        </button>

        <!-- Painel de informações -->
        <div class="info-panel" id="infoPanel">
            <span id="infoText">✨ MODO ALEATÓRIO ATIVO</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
