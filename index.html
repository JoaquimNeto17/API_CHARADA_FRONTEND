<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, user-scalable=no">
    <title>Charadas • Cartoon Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cartoon-bg"></div>

    <div class="container">
        <!-- Cabeçalho -->
        <header class="header">
            <div class="icon-wrapper">
                <span class="emoji-icon">❓</span>
            </div>
            <h1 class="title">CHARADAS</h1>
            <p class="subtitle">VIRE O CARD E DESCUBRA!</p>
        </header>

        <!-- Seletor de modo -->
        <div class="mode-selector">
            <button class="mode-btn" id="btnModeDaily">
                <span>📅</span>
                <span>CHARADA DO DIA</span>
            </button>
            <button class="mode-btn" id="btnModeRandom">
                <span>🎲</span>
                <span>ALEATÓRIA</span>
            </button>
        </div>

        <!-- Card 3D -->
        <div class="card-wrapper">
            <div class="card" id="cardInner">
                <!-- Frente - Pergunta -->
                <div class="card-face front">
                    <div class="face-header">
                        <span class="badge" id="badgeTipo">🎲 PERGUNTA</span>
                    </div>
                    <p class="question" id="pergunta">CARREGANDO...</p>
                    <div class="hint">
                        <span>👇 CLIQUE PARA VIRAR 👇</span>
                    </div>
                </div>

                <!-- Verso - Resposta -->
                <div class="card-face back">
                    <div class="face-header">
                        <span class="badge badge-resposta">🔓 RESPOSTA</span>
                    </div>
                    <p class="answer" id="resposta"></p>
                    <div class="hint back-hint">
                        <span>👆 CLIQUE PARA VOLTAR 👆</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botão principal -->
        <button class="btn-primary" id="btnNova">
            <span id="btnIcon">🎲</span>
            <span id="btnText">NOVA CHARADA</span>
        </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
